<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATO Battle: Communication Only</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEod8zm1jvvkmPbe6cA_SQo2U_esC9yTY",
            authDomain: "aangiftebotje.firebaseapp.com",
            databaseURL: "https://aangiftebotje-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aangiftebotje",
            storageBucket: "aangiftebotje.firebasestorage.app",
            messagingSenderId: "825633841222",
            appId: "1:825633841222:web:15d93d08e2b719285dea47"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const woordenlijst = [
            {w: "charisma", c: "uitstraling; persoonlijke aantrekkingskracht", f: ["gierigheid", "saaiheid", "onvriendelijkheid", "moeheid"]},
            {w: "bigamie", c: "het gelijktijdig gehuwd zijn met twee personen", f: ["vrijgezel zijn", "trouwen met familie", "haat tegen vrouwen", "angst voor groepen"]},
            {w: "hypocrisie", c: "schijnheiligheid; huichelarij", f: ["eerlijkheid", "vrijgevigheid", "angst voor mensen", "extreem geluk"]},
            {w: "tarten", c: "prikkelen tot een handeling; uitdagen", f: ["bejubelen", "negeren", "troosten", "vergeten"]},
            {w: "consistent", c: "samenhangend; consequent", f: ["onlogisch", "slordig", "vluchtig", "gevoelig"]},
            {w: "replica", c: "kopie van een kunstwerk", f: ["origineel", "schets", "museum", "lijst"]},
            {w: "paria", c: "verschoppeling; uitgestotene", f: ["leider", "volgeling", "rijk man", "soldaat"]},
            {w: "semafoon", c: "apparaat voor tekstberichten; pager; buzzer", f: ["microfoon", "luidspreker", "camera", "radio"]},
            {w: "fysionomie", c: "kunst om aan het uiterlijk de persoonlijkheid af te lezen", f: ["anatomie", "plantkunde", "sterrenkunde", "geschiedenis"]},
            {w: "imposant", c: "indrukwekkend; groots", f: ["klein", "lelijk", "modern", "zwak"]},
            {w: "geconfisqueerd", c: "gerechtelijk in beslag genomen", f: ["gekocht", "vrijgegeven", "gestolen", "verloren"]},
            {w: "agitatie", c: "onrust; spanningen", f: ["rust", "vrede", "vriendschap", "stilte"]},
            {w: "geriatrie", c: "specialisme voor ouderdomsziekten", f: ["kindergeneeskunde", "chirurgie", "tandheelkunde", "oogheelkunde"]},
            {w: "fatalisme", c: "geloof aan een onvermijdelijk lot", f: ["optimisme", "vrije wil", "toeval", "geluk"]},
            {w: "marginaal", c: "onbelangrijk; klein; aan de grens", f: ["centraal", "gigantisch", "essentieel", "duidelijk"]},
            {w: "altruïst", c: "onbaatzuchtig mens; anderen staan voorop", f: ["egoïst", "vrek", "atleet", "luilak"]},
            {w: "psychose", c: "situatie waarbij contact met de werkelijkheid kwijt is", f: ["burn-out", "vermoeidheid", "griep", "verkoudheid"]},
            {w: "copieuze", c: "overvloedige; rijkelijke", f: ["magere", "viezige", "snelle", "koude"]},
            {w: "coulisse", c: "onderdeel van een toneeldecor aan de zijkant", f: ["podium", "gordijn", "lamp", "stoel"]},
            {w: "geëquipeerd", c: "uitgerust met benodigdheden", f: ["getraind", "betaald", "gekleed", "gevoed"]},
            {w: "magnaat", c: "rijk en invloedrijk persoon", f: ["bedelaar", "monnik", "rechter", "crimineel"]},
            {w: "sectie", c: "opening van een lijk om de doodsoorzaak vast te stellen", f: ["operatie", "pleister", "injectie", "massage"]},
            {w: "hetze", c: "haatcampagne; kwaadaardige actie", f: ["feest", "reclame", "overleg", "vakantie"]},
            {w: "modaal", c: "gemiddeld (inkomen)", f: ["extreem", "hoogst", "laagst", "uniek"]},
            {w: "corvee", c: "strafdienst", f: ["vrijwilligerswerk", "vakantie", "bonus", "vrije tijd"]},
            {w: "confidentieel", c: "vertrouwelijk", f: ["openbaar", "grappig", "saai", "luidruchtig"]},
            {w: "satirische", c: "op geestige wijze kritiek leverend", f: ["serieus", "saai", "verdrietig", "vrolijk"]},
            {w: "heterogeen", c: "ongelijksoortig", f: ["gelijk", "hetzelfde", "saai", "vloeibaar"]},
            {w: "fascinatie", c: "betovering; sterke belangstelling", f: ["afkeer", "haat", "verveling", "angst"]}
        ];

        let huidigeKlas, mijnNaam, mijnTeam, cardIndex = 0;
        const teamKleuren = { "Team-Rood": "#ff4d4d", "Team-Blauw": "#3399ff", "Team-Groen": "#28a745" };

        window.startLes = async function() {
            mijnNaam = document.getElementById('voornaam').value.trim();
            huidigeKlas = document.getElementById('klasSelect').value;
            if(!mijnNaam || !huidigeKlas) return alert("Identificeer uzelf!");

            const usersRef = ref(db, `battle/${huidigeKlas}/users`);
            const snap = await get(usersRef);
            const userCount = snap.size || 0;
            const teams = ["Rood", "Blauw", "Groen"];
            mijnTeam = "Team-" + teams[userCount % 3];

            await set(ref(db, `battle/${huidigeKlas}/users/${mijnNaam}`), { team: mijnTeam });
            
            document.getElementById('teamIndicator').style.color = teamKleuren[mijnTeam];
            document.getElementById('login-scherm').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('teamIndicator').innerText = "UNIT: " + mijnTeam.toUpperCase();
            
            updateFlashcard();
            luisterNaarGameStatus();
            luisterNaarKlasDashboard();
            luisterNaarLeden();
        };

        function updateFlashcard() {
            const card = woordenlijst[cardIndex];
            document.getElementById('card-front').innerText = card.w;
            document.getElementById('card-back').innerText = card.c;
            document.getElementById('flashcard').classList.remove('flipped');
        }

        window.nextCard = () => { cardIndex = (cardIndex + 1) % woordenlijst.length; updateFlashcard(); };
        window.flipCard = () => document.getElementById('flashcard').classList.toggle('flipped');

        function luisterNaarGameStatus() {
            onValue(ref(db, `battle/${huidigeKlas}/status`), (snap) => {
                const status = snap.val();
                document.getElementById('training-zone').style.display = status === "gestart" ? 'none' : 'block';
                document.getElementById('vraagAreaContent').style.display = status === "gestart" ? 'block' : 'none';
                if(status === "gestart") luisterNaarTeamProgress();
            });
        }

        function luisterNaarTeamProgress() {
            onValue(ref(db, `battle/${huidigeKlas}/teams/${mijnTeam}`), (snap) => {
                const data = snap.val() || { index: 0, fouten: 0 };
                toonVraag(data.index, data.fouten);
            });
        }

        function luisterNaarKlasDashboard() {
            onValue(ref(db, `battle/${huidigeKlas}/teams`), (snap) => {
                const dashboard = document.getElementById('dashboard-list');
                dashboard.innerHTML = '';
                const teamsData = snap.val() || {};
                ["Team-Rood", "Team-Blauw", "Team-Groen"].forEach(tName => {
                    const tData = teamsData[tName] || { index: 0 };
                    const perc = Math.round((tData.index / woordenlijst.length) * 100);
                    const kleur = teamKleuren[tName];
                    dashboard.innerHTML += `
                        <div class="dash-team">
                            <div style="display:flex; justify-content:space-between; color:${kleur}; font-size:0.8em; font-weight:bold;">
                                <span>${tName}</span><span>${perc}%</span>
                            </div>
                            <div class="progress-bg"><div class="progress-fill" style="width:${perc}%; background:${kleur};"></div></div>
                        </div>`;
                });
            });
        }

        function luisterNaarLeden() {
            onValue(ref(db, `battle/${huidigeKlas}/users`), (snap) => {
                const ledenArea = document.getElementById('leden-lijst');
                ledenArea.innerHTML = '';
                const users = snap.val() || {};
                const teams = { "Team-Rood": [], "Team-Blauw": [], "Team-Groen": [] };
                Object.entries(users).forEach(([naam, d]) => teams[d.team].push(naam));
                
                Object.entries(teams).forEach(([tName, namen]) => {
                    const kleur = teamKleuren[tName];
                    ledenArea.innerHTML += `<div style="margin-bottom:10px;"><b style="color:${kleur}; font-size:0.7em;">${tName}</b><br><span style="font-size:0.8em; color:#888;">${namen.join(', ') || '...'}</span></div>`;
                });
            });
        }

        function toonVraag(index, fouten) {
            if(index >= woordenlijst.length) {
                document.getElementById('vraagAreaContent').innerHTML = `<h1 style="color:${teamKleuren[mijnTeam]}">MISSIE VOLBRACHT</h1>`;
                return;
            }
            const item = woordenlijst[index];
            document.getElementById('woordDisplay').innerText = item.w;
            
            // Bepaal of deze specifieke student het juiste antwoord krijgt
            const hash = mijnNaam.split('').reduce((a,b) => {a=((a<<5)-a)+b.charCodeAt(0);return a&a},0);
            const krijgtAntwoord = ((Math.abs(hash) + index) % 2 === 0);
            
            let opties;
            if (krijgtAntwoord) {
                // Deze student heeft de juiste definitie + 3 foute
                opties = [item.c, item.f[0], item.f[1], item.f[2]];
            } else {
                // Deze student ziet alleen maar 4 foute definities
                opties = [item.f[0], item.f[1], item.f[2], item.f[3]];
            }
            
            opties.sort(() => Math.random() - 0.5);
            
            const btnArea = document.getElementById('buttonArea');
            btnArea.innerHTML = '';
            opties.forEach(optie => {
                const btn = document.createElement('button');
                btn.innerText = optie;
                btn.style.borderColor = teamKleuren[mijnTeam];
                btn.onclick = () => {
                    if(optie === item.c) update(ref(db, `battle/${huidigeKlas}/teams/${mijnTeam}`), { index: index + 1, fouten: 0 });
                    else verwerkFout(index, fouten, item.c);
                };
                btnArea.appendChild(btn);
            });
        }

        function verwerkFout(index, fouten, correct) {
            const nieuweFouten = fouten + 1;
            document.getElementById('feedback').innerText = "FOUT! OVERLEG BETER.";
            document.getElementById('buttonArea').style.pointerEvents = "none";
            setTimeout(() => {
                document.getElementById('feedback').innerText = "";
                document.getElementById('buttonArea').style.pointerEvents = "auto";
                if(nieuweFouten >= 2) set(ref(db, `battle/${huidigeKlas}/teams/${mijnTeam}`), { index: 0, fouten: 0 });
                else update(ref(db, `battle/${huidigeKlas}/teams/${mijnTeam}`), { fouten: nieuweFouten });
            }, 3000);
        }

        window.startSpelVandaag = () => set(ref(db, `battle/${huidigeKlas}/status`), "gestart");
        window.resetKlas = () => { if(confirm("Klas resetten?")) { remove(ref(db, `battle/${huidigeKlas}`)); location.reload(); }};
    </script>
    <style>
        body { font-family: 'Consolas', monospace; background: #050505; color: #eee; margin: 0; padding: 20px; }
        .panel { background: #0d0d0d; border: 1px solid #333; padding: 25px; border-radius: 4px; }
        #login-scherm { max-width: 400px; margin: 100px auto; text-align: center; }
        #game-container { display: none; gap: 20px; max-width: 1200px; margin: auto; }
        .main-battle { flex: 3; text-align: center; }
        .dashboard { flex: 1; border-left: 1px solid #222; padding-left: 20px; }
        .flashcard-container { perspective: 1000px; width: 300px; height: 180px; margin: 20px auto; cursor: pointer; }
        #flashcard { width: 100%; height: 100%; transition: 0.5s; transform-style: preserve-3d; position: relative; border: 1px solid #444; }
        #flashcard.flipped { transform: rotateY(180deg); }
        .card-side { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 20px; background: #111; text-align: center; font-size: 1.1em; }
        .card-back { transform: rotateY(180deg); background: #1a1a1a; color: #0f0; }
        button { background: #000; color: #fff; border: 1px solid #444; padding: 15px; width: 100%; cursor: pointer; margin-top: 10px; font-family: inherit; }
        button:hover { background: #111; }
        .progress-bg { background: #222; height: 8px; margin: 5px 0 15px 0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; transition: 1s; }
        input, select { background: #000; color: #fff; border: 1px solid #444; padding: 12px; width: 100%; margin-bottom: 15px; }
        #woordDisplay { font-size: 3.5em; margin: 20px 0; }
        .header-label { font-size: 0.65em; color: #555; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 5px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="login-scherm" class="panel">
    <h2>NATO BATTLE v2.5</h2>
    <input type="text" id="voornaam" placeholder="VOORNAAM">
    <select id="klasSelect">
        <option value="Alfa">ALFA</option><option value="Bravo">BRAVO</option><option value="Charlie">CHARLIE</option>
        <option value="Delta">DELTA</option><option value="Echo">ECHO</option><option value="Foxtrot">FOXTROT</option>
        <option value="Golf">GOLF</option><option value="Hotel">HOTEL</option><option value="Juliett">JULIETT</option>
    </select>
    <button onclick="startLes()">START TRAINING</button>
</div>

<div id="game-container">
    <div class="panel main-battle">
        <div id="teamIndicator" style="font-weight:bold; margin-bottom:20px;">---</div>
        
        <div id="training-zone">
            <div class="header-label">Flashcard Training</div>
            <div class="flashcard-container" onclick="flipCard()">
                <div id="flashcard">
                    <div class="card-side card-front" id="card-front">---</div>
                    <div class="card-side card-back" id="card-back">---</div>
                </div>
            </div>
            <button onclick="nextCard()" style="width: 50px; border-radius: 50%;">➔</button>
            <p style="color:gold; font-size:0.8em; margin-top:20px;">Leer de woorden. De docent start de battle.</p>
        </div>

        <div id="vraagAreaContent" style="display:none;">
            <div class="header-label">Battle in Progress</div>
            <div id="woordDisplay">---</div>
            <p style="font-size:0.8em; color:#666;">COMMUNICEER: Slechts één teamlid heeft de juiste optie.</p>
            <div id="buttonArea"></div>
            <div id="feedback" style="color:#ff4d4d; margin-top:10px; font-weight:bold;"></div>
        </div>

        <div style="margin-top:60px; padding-top:20px; border-top:1px solid #222;">
            <button onclick="startSpelVandaag()" style="color:#0f0; border-color:#050; width:auto; padding:5px 20px; font-size:0.8em;">START SPEL</button>
            <button onclick="resetKlas()" style="color:#500; border-color:#300; width:auto; padding:5px 20px; font-size:0.8em; margin-left:10px;">RESET</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="header-label">Team Voortgang</div>
        <div id="dashboard-list"></div>
        <div class="header-label" style="margin-top:30px;">Unit Leden</div>
        <div id="leden-lijst"></div>
    </div>
</div>

</body>
</html>
