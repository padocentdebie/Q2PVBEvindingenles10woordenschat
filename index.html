<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATO Battle: Woordenschat Gecontroleerd</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBEod8zm1jvvkmPbe6cA_SQo2U_esC9yTY",
            authDomain: "aangiftebotje.firebaseapp.com",
            databaseURL: "https://aangiftebotje-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aangiftebotje",
            storageBucket: "aangiftebotje.firebasestorage.app",
            messagingSenderId: "825633841222",
            appId: "1:825633841222:web:15d93d08e2b719285dea47"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // De lijst is nu 100% gecontroleerd op basis van jouw input
        const woordenlijst = [
            {w: "charisma", c: "uitstraling; persoonlijke aantrekkingskracht", f: ["gierigheid", "saaiheid", "onvriendelijkheid"]},
            {w: "bigamie", c: "het gelijktijdig gehuwd zijn met twee personen", f: ["vrijgezel zijn", "trouwen met familie", "haat tegen vrouwen"]},
            {w: "hypocrisie", c: "schijnheiligheid; huichelarij", f: ["eerlijkheid", "vrijgevigheid", "angst voor mensen"]},
            {w: "tarten", c: "prikkelen tot een handeling; uitdagen", f: ["bejubelen", "negeren", "troosten"]},
            {w: "consistent", c: "samenhangend; consequent", f: ["onlogisch", "slordig", "vluchtig"]},
            {w: "replica", c: "kopie van een kunstwerk", f: ["origineel", "schets", "museum"]},
            {w: "paria", c: "verschoppeling; uitgestotene", f: ["leider", "volgeling", "rijk man"]},
            {w: "semafoon", c: "apparaat voor tekstberichten; pager; buzzer", f: ["microfoon", "luidspreker", "camera"]},
            {w: "fysionomie", c: "kunst om aan het uiterlijk de persoonlijkheid af te lezen", f: ["anatomie", "plantkunde", "sterrenkunde"]},
            {w: "imposant", c: "indrukwekkend; groots", f: ["klein", "lelijk", "modern"]},
            {w: "geconfisqueerd", c: "gerechtelijk in beslag genomen", f: ["gekocht", "vrijgegeven", "gestolen"]},
            {w: "agitatie", c: "onrust; spanningen", f: ["rust", "vrede", "vriendschap"]},
            {w: "geriatrie", c: "specialisme voor ouderdomsziekten", f: ["kindergeneeskunde", "chirurgie", "tandheelkunde"]},
            {w: "fatalisme", c: "geloof aan een onvermijdelijk lot", f: ["optimisme", "vrije wil", "toeval"]},
            {w: "marginaal", c: "onbelangrijk; klein; aan de grens", f: ["centraal", "gigantisch", "essentieel"]},
            {w: "altruïst", c: "onbaatzuchtig mens; anderen staan voorop", f: ["egoïst", "vrek", "atleet"]},
            {w: "psychose", c: "situatie waarbij contact met de werkelijkheid kwijt is", f: ["burn-out", "vermoeidheid", "griep"]},
            {w: "copieuze", c: "overvloedige; rijkelijke", f: ["magere", "viezige", "snelle"]},
            {w: "coulisse", c: "onderdeel van een toneeldecor aan de zijkant", f: ["podium", "gordijn", "lamp"]},
            {w: "geëquipeerd", c: "uitgerust met benodigdheden", f: ["getraind", "betaald", "gekleed"]},
            {w: "magnaat", c: "iemand met veel invloed door rijkdom", f: ["bedelaar", "monnik", "rechter"]},
            {w: "sectie", c: "opening van een lijk om de doodsoorzaak vast te stellen", f: ["operatie", "pleister", "injectie"]},
            {w: "hetze", c: "haatcampagne; kwaadaardige actie", f: ["feest", "reclame", "overleg"]},
            {w: "modaal", c: "gemiddeld (inkomen)", f: ["extreem", "hoogst", "laagst"]},
            {w: "corvee", c: "strafdienst", f: ["vrijwilligerswerk", "vakantie", "bonus"]},
            {w: "confidentieel", c: "vertrouwelijk", f: ["openbaar", "grappig", "saai"]},
            {w: "satirische", c: "op geestige wijze kritiek leverend", f: ["serieus", "saai", "verdrietig"]},
            {w: "heterogeen", c: "ongelijksoortig", f: ["gelijk", "hetzelfde", "saai"]},
            {w: "fascinatie", c: "betovering; sterke belangstelling", f: ["afkeer", "haat", "verveling"]}
        ];

        let huidigeKlas, mijnNaam, mijnTeam;

        window.startLes = async function() {
            mijnNaam = document.getElementById('voornaam').value.trim();
            huidigeKlas = document.getElementById('klasSelect').value;
            if(!mijnNaam || !huidigeKlas) return alert("Vul je naam in en kies je NATO-klas!");

            const usersRef = ref(db, `battle/${huidigeKlas}/users`);
            const snap = await get(usersRef);
            const userCount = snap.size || 0;
            mijnTeam = (userCount % 2 === 0) ? "Team-Alfa" : "Team-Bravo";

            await set(ref(db, `battle/${huidigeKlas}/users/${mijnNaam}`), { team: mijnTeam });
            
            document.getElementById('login-scherm').style.display = 'none';
            document.getElementById('game-scherm').style.display = 'block';
            document.getElementById('teamNameDisplay').innerText = "Jij strijdt voor: " + mijnTeam;

            luisterNaarTeamProgress();
        };

        function luisterNaarTeamProgress() {
            onValue(ref(db, `battle/${huidigeKlas}/teams/${mijnTeam}`), (snap) => {
                const data = snap.val() || { index: 0, fouten: 0 };
                toonVraag(data.index, data.fouten);
            });
        }

        function toonVraag(index, fouten) {
            if(index >= woordenlijst.length) {
                document.getElementById('vraagArea').innerHTML = "<h1 style='color:#00ff88'>MISSIE VOLBRACHT!</h1><p>Jullie team heeft alle 30 woorden beheerst.</p>";
                return;
            }
            
            const item = woordenlijst[index];
            document.getElementById('woordDisplay').innerText = item.w;
            document.getElementById('progressDisplay').innerText = `Voortgang: ${index + 1} / ${woordenlijst.length} | Teamfouten: ${fouten}/2`;

            const hash = mijnNaam.split('').reduce((a,b) => {a=((a<<5)-a)+b.charCodeAt(0);return a&a},0);
            const krijgtAntwoord = ((Math.abs(hash) + index) % 2 === 0);
            
            let opties = [...item.f];
            if(krijgtAntwoord) {
                opties.push(item.c);
            } else {
                opties.push("Ik heb de juiste uitleg NIET (Overleg!)");
            }

            opties = opties.sort(() => Math.random() - 0.5);
            
            const btnArea = document.getElementById('buttonArea');
            btnArea.innerHTML = '';
            opties.forEach(optie => {
                const btn = document.createElement('button');
                btn.innerText = optie;
                btn.onclick = () => verwerkGok(optie, item.c, index, fouten);
                btnArea.appendChild(btn);
            });
        }

        async function verwerkGok(gekozen, correct, index, fouten) {
            const teamRef = ref(db, `battle/${huidigeKlas}/teams/${mijnTeam}`);
            
            if(gekozen === correct) {
                update(teamRef, { index: index + 1, fouten: 0 });
            } else if (gekozen.includes("NIET")) {
                alert("Kijk op het scherm van je teamgenoten!");
            } else {
                const nieuweFouten = fouten + 1;
                document.getElementById('feedback').innerText = `FOUT! Correct was: ${correct}`;
                document.getElementById('buttonArea').style.pointerEvents = "none";

                setTimeout(() => {
                    document.getElementById('feedback').innerText = "";
                    document.getElementById('buttonArea').style.pointerEvents = "auto";
                    if(nieuweFouten >= 2) {
                        set(teamRef, { index: 0, fouten: 0 });
                        alert("2x FOUT! Jullie vallen terug naar de start!");
                    } else {
                        update(teamRef, { fouten: nieuweFouten });
                    }
                }, 3000);
            }
        }
    </script>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background: #050505; color: #00ff88; text-align: center; padding: 20px; }
        .box { background: #111; padding: 40px; border-radius: 5px; max-width: 700px; margin: 50px auto; border: 1px solid #00ff88; box-shadow: 0 0 20px rgba(0,255,136,0.2); }
        #woordDisplay { font-size: 3.5em; font-weight: bold; margin: 30px 0; text-transform: uppercase; color: #fff; text-shadow: 2px 2px #00ff88; }
        button { background: #000; color: #00ff88; border: 1px solid #00ff88; padding: 18px; margin: 10px 0; width: 100%; cursor: pointer; font-size: 1.1em; }
        button:hover { background: #00ff88; color: #000; }
        #feedback { color: #ff0044; min-height: 25px; margin-top: 15px; font-weight: bold; }
        .team-badge { border: 1px solid #00ff88; padding: 5px 20px; margin-bottom: 20px; display: inline-block; }
        #progressDisplay { color: #888; margin-bottom: 10px; }
        input, select { background: #000; border: 1px solid #00ff88; color: #00ff88; padding: 15px; width: 100%; margin-bottom: 15px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-scherm" class="box">
    <h1>UNIT WORD-BATTLE v1.0</h1>
    <p>NATO-KLASSE SEGMENTATIE</p>
    <input type="text" id="voornaam" placeholder="OPERATOR NAAM">
    <select id="klasSelect">
        <option value="Alfa">ALFA</option><option value="Bravo">BRAVO</option>
        <option value="Charlie">CHARLIE</option><option value="Delta">DELTA</option>
        <option value="Echo">ECHO</option><option value="Foxtrot">FOXTROT</option>
        <option value="Golf">GOLF</option><option value="Hotel">HOTEL</option>
        <option value="Juliett">JULIETT</option><option value="Kilo">KILO</option>
        <option value="Lima">LIMA</option><option value="Mike">MIKE</option>
        <option value="November">NOVEMBER</option><option value="Oscar">OSCAR</option>
        <option value="Papa">PAPA</option><option value="Quebec">QUEBEC</option>
        <option value="Romeo">ROMEO</option><option value="Sierra">SIERRA</option>
        <option value="Tango">TANGO</option><option value="Uniform">UNIFORM</option>
        <option value="Victor">VICTOR</option><option value="Whiskey">WHISKEY</option>
        <option value="X-ray">X-RAY</option><option value="Yankee">YANKEE</option>
        <option value="Zulu">ZULU</option>
    </select>
    <button onclick="startLes()">INITIALISEER VERBINDING</button>
</div>

<div id="game-scherm" class="box" style="display:none;">
    <div id="progressDisplay"></div>
    <div class="team-badge" id="teamNameDisplay">TEAM</div>
    <div id="vraagArea">
        <div id="woordDisplay">---</div>
        <p>SCAN UW TEAMLEDEN VOOR DE CORRECTE DEFINITIE</p>
        <div id="buttonArea"></div>
        <div id="feedback"></div>
    </div>
</div>

</body>
</html>
